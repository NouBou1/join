<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>join-Signup</title>

  <link rel="icon" href="../assets/img/logo-bright.svg" type="image/png" />
  <link rel="stylesheet" href="../styles/colors.css" />
  <link rel="stylesheet" href="../styles/standard.css" />
  <link rel="stylesheet" href="../styles/fonts.css" />
  <link rel="stylesheet" href="../styles/join.css" />
  <link rel="stylesheet" href="../styles/assets.css" />
  <link rel="stylesheet" href="./css/signup.css" />

  <script type="module" src="../scripts/firebase/firebase.js"></script>
  <script type="module" src="./js/signup.js"></script>
</head>

<body>
  <main>
    <div>
      <img class="join__logo join-icon" src="../assets/img/logo-dark.svg" alt="Join-logo" />
    </div>

    <section class="signup">
      <a href="../index.html">
        <img class="signup__return" src="../assets/icons/arrow-left-icon.svg" alt="arrow-left" />
      </a>
      <div class="signup__header">

        <h2 class="signup__title">Sign up</h2>
      </div>

      <form class="signup__form" id="signupForm" action="" novalidate>
        <div class="signup__field">
          <input class="signup__input signup__input--name" type="text" id="signupName" placeholder="Name"
            autocomplete="username" />
        </div>
        <div class="signup__field">
          <input class="signup__input signup__input--email" type="text" name="email" id="loginEmail" placeholder="Email"
            autocomplete="email" />
          <span id="signupEmailError" class="signup__error--text">
            Email must contain an @ character.
          </span>
        </div>
        <input class="signup__input signup__input--password" type="password" name="Password" id="loginPassword"
          placeholder="Password" autocomplete="new-password" />

        <div class="signup__field">
          <input id="signupConfirmPassword" class="signup__input signup__input--confirm-password" type="password"
            placeholder="Confirm Password" autocomplete="new-password" />

          <span id="signupPasswordError" class="signup__error--text">
            Your passwords don’t match. Please try again.
          </span>
        </div>

        <div class="signup__terms">
          <input class="signup__checkbox" type="checkbox" name="termsCheckbox" id="termsCheckbox" />

          <label class="signup__terms-label" for="termsCheckbox">
            I accept the
            <a class="terms__checkbox--a" href="./privacy-policy-public.html">
              Privacy Policy
            </a>
          </label>
        </div>

        <button class="button button__signup" id="signupBtn" type="submit" disabled>
          Sign up
        </button>
      </form>
    </section>
  </main>

  <footer class="footer-signup">
    <a class="footer__link footer__privacy" href="./privacy-policy-public.html">
      Privacy Policy
    </a>
    <a class="footer__link footer__legal" href="./legal-notice-public.html">
      Legal Notice
    </a>
  </footer>
</body>

</html>
